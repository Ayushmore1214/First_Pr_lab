name: Thank Contributor on Merge

on:
  pull_request_target:
    types: [closed]

jobs:
  thank:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.title == 'My First Open Source Contribution'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const username = context.payload.pull_request.user.login;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `@${username} your PR just merged. You are officially a contributor to FirstCommit.\n\nYour name is now in the project and the change is live at https://ayushmore1214.github.io/FirstCommit/\n\n**What to do next:**\n\n1. Go to the [Issues tab](https://github.com/Ayushmore1214/FirstCommit/issues) and find something labeled \`good first issue\`\n2. Leave a comment to claim it\n3. Fix it and open a PR - your change ships to the live site automatically when merged\n\nIf you want to share this moment, drop a note in [Show and tell](https://github.com/Ayushmore1214/FirstCommit/discussions/28). Glad you are here.`
            });

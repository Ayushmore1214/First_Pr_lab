name: Welcome New Contributors

# Posts a welcoming comment when a contributor opens their very first PR.
# Uses GitHub's built-in first-time contributor detection.

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    name: Post Welcome Message
    runs-on: ubuntu-latest

    steps:
      - name: Welcome first-time contributors
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const sender = pr.user.login;
            const title = pr.title;
            const isIntroPR = title === 'My First Open Source Contribution';

            // Check if this is the user's first PR to this repo
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 10,
            });

            const previousPRsFromUser = pullRequests.filter(
              p => p.user.login === sender && p.number !== pr.number
            );

            if (previousPRsFromUser.length > 0) {
              console.log(`${sender} has opened PRs before — skipping welcome message.`);
              return;
            }

            let message;

            if (isIntroPR) {
              message = `## Welcome to your first open source contribution, @${sender}! 🎉

Thank you for opening this PR — you just took a step that many people think about but very few actually do.

Here's what happens next:

1. **A maintainer will review your PR** — usually within a day or two. We'll make sure your name, GitHub username, and LinkedIn link are formatted correctly in \`CONTRIBUTORS.md\`.
2. **Your PR gets merged** — once everything looks good, we'll merge it. Your name is now in the git history of a real open source project. Forever.
3. **You can pick a real issue** — once your intro PR is merged, head to the [Issues tab](https://github.com/${context.repo.owner}/${context.repo.repo}/issues) and look for issues labeled \`good first issue\`. These are real improvements to the project webpage — pick one that interests you and leave a comment saying you'd like to work on it.

---

**If you get stuck at any point**, reach out to Ayush directly on [LinkedIn](https://www.linkedin.com/in/ayush-more-3b4154341/?skipRedirect=true) — there's a real human there who wants to help you succeed. No question is too small.

You've got this. Welcome to open source! 🚀`;
            } else {
              message = `## Thanks for contributing, @${sender}! 👋

We've received your pull request and will review it soon. Here's a quick checklist while you wait:

- [ ] Your commit messages include a \`Signed-off-by\` line (DCO sign-off)
- [ ] Your PR description clearly explains **what** changed and **why**
- [ ] If this fixes an issue, the PR body references it (e.g., \`Fixes #12\`)
- [ ] You've tested your change by opening \`src/index.html\` in a browser

If you have any questions, reach out to Ayush on [LinkedIn](https://www.linkedin.com/in/ayush-more-3b4154341/?skipRedirect=true).

Thanks for helping make this project better! 🙌`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: message,
            });

            console.log(`Welcome comment posted for ${sender}`);
